model:
  name: "aaditya/OpenBioLLM-Llama3-8B"
  dtype: "bfloat16"

serve:
  backend: "vllm"
  num_replicas: 1
  port: 0  

  vllm:
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.88
    max_model_len: 8192

  gateway:
    enabled: true
    proxy_port: 0  
    cloudflared: true

inference:
  max_new_tokens: 256
  temperature: 0.6
  top_p: 0.9
  do_sample: true
